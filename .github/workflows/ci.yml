name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  CI_COVERAGE_THRESHOLD: '95'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install

      - name: Check composer.json is normalized
        run: composer normalize --dry-run

      - name: Lint
        run: composer lint

  tests:
    name: PHP ${{ matrix.php_version }}, Drupal ${{ matrix.drupal_version }}, Deps ${{ matrix.deps }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - php_version: '8.2'
            drupal_version: '10'
            deps: 'normal'
          - php_version: '8.2'
            drupal_version: '10'
            deps: 'lowest'
          - php_version: '8.3'
            drupal_version: '10'
            deps: 'normal'
          - php_version: '8.3'
            drupal_version: '10'
            deps: 'lowest'
          - php_version: '8.3'
            drupal_version: '11'
            deps: 'normal'
          - php_version: '8.3'
            drupal_version: '11'
            deps: 'lowest'
          - php_version: '8.4'
            drupal_version: '10'
            deps: 'normal'
          - php_version: '8.4'
            drupal_version: '10'
            deps: 'lowest'
          - php_version: '8.4'
            drupal_version: '11'
            deps: 'normal'
            coverage: true
          - php_version: '8.4'
            drupal_version: '11'
            deps: 'lowest'

    env:
      DRUPAL_VERSION: ${{ matrix.drupal_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php_version }}
          extensions: gd, pdo_sqlite
          coverage: ${{ matrix.coverage && 'pcov' || 'none' }}

      - name: Add Drupal core dependency
        run: composer require --no-interaction --dev --no-update drupal/core-recommended:^${DRUPAL_VERSION} drupal/core-composer-scaffold:^${DRUPAL_VERSION}

      - name: Pin Drupal 10 tooling
        if: ${{ matrix.drupal_version == '10' }}
        run: composer require --no-interaction --dev --no-update mglaman/phpstan-drupal:^1.1.25 phpstan/phpstan:^1.10 phpunit/phpunit:^9.6 rector/rector:^1

      - name: Pin Drupal 11 tooling
        if: ${{ matrix.drupal_version == '11' }}
        run: composer require --no-interaction --dev --no-update "phpunit/phpunit:^10.5.19 || ^11.5.3"

      - name: Install Composer dependencies
        run: |
          if [[ "${{ matrix.deps }}" == "lowest" ]]; then
            composer update --with-all-dependencies --prefer-lowest --prefer-stable
          else
            composer update --with-all-dependencies
          fi

      - name: Migrate PHPUnit configuration
        run: vendor/bin/phpunit --migrate-configuration || true
        if: "${{ matrix.drupal_version == '11'}}"

      - name: Test with coverage
        if: ${{ matrix.coverage }}
        run: composer test-coverage

      - name: Test
        if: ${{ !matrix.coverage }}
        run: composer test

      - name: Extract total coverage
        if: ${{ matrix.coverage }}
        run: |
          set -euo pipefail
          if [ ! -s .logs/coverage/cobertura.xml ]; then
            echo "cobertura.xml missing or empty" >&2
            exit 1
          fi
          RATE=$(grep -om1 'line-rate="[0-9.]*"' .logs/coverage/cobertura.xml | tr -cd '0-9.')
          : "${RATE:?failed to parse line-rate from cobertura.xml}"
          PERCENT=$(awk "BEGIN {printf \"%.2f\", $RATE*100}")
          echo "**Total coverage: $PERCENT%** (threshold: $CI_COVERAGE_THRESHOLD%)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "TOTAL_COVERAGE_PERCENT=${PERCENT}" >> "$GITHUB_ENV"
          if [ -f .logs/coverage/coverage-summary.txt ]; then
            { echo "COVERAGE_SUMMARY<<EOF"; cat .logs/coverage/coverage-summary.txt; echo "EOF"; } >> "$GITHUB_ENV"
          fi
          DETAILS=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('.logs/coverage/cobertura.xml')
          for cls in tree.iter('class'):
              name = cls.get('name','')
              rate = float(cls.get('line-rate','0'))*100
              print(f'{name:60s} {rate:6.2f}%')
          ")
          { echo "COVERAGE_DETAILS<<EOF"; echo "$DETAILS"; echo "EOF"; } >> "$GITHUB_ENV"

      - name: Post coverage summary as PR comment
        if: ${{ github.event_name == 'pull_request' && matrix.coverage }}
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: coverage
          message: |
            **Code coverage** (threshold: ${{ env.CI_COVERAGE_THRESHOLD }}%)
            ```
            ${{ env.COVERAGE_SUMMARY }}
            ```
            <details>
            <summary>Per-class coverage</summary>

            ```
            ${{ env.COVERAGE_DETAILS }}
            ```
            </details>

      - name: Check coverage threshold
        if: ${{ matrix.coverage }}
        run: |
          if awk "BEGIN {exit !($TOTAL_COVERAGE_PERCENT < $CI_COVERAGE_THRESHOLD)}"; then
            echo "FAIL: Total coverage ${TOTAL_COVERAGE_PERCENT}% is below threshold ${CI_COVERAGE_THRESHOLD}%"
            exit 1
          fi

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() && matrix.coverage }}
        with:
          name: coverage-report
          path: .logs
          include-hidden-files: true
          if-no-files-found: ignore
